name: build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
  pull_request:
    paths-ignore:
      - '*.md'

jobs:

  build:
    
    permissions:
      contents: write
      pull-requests: write
    
    runs-on: windows-latest

    env:
      Solution_Path: EyeProtect.slnx
      Project_Path: src\EyeProtect\EyeProtect.csproj

    steps:

      # Checkout codes
      - name: Checkout
        uses: actions/checkout@v6

      # Install the .NET Core workload
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      # Restore dependencies for entire solution
      - name: Restore dependencies
        run: dotnet restore ${{ env.Solution_Path }}

      # Build the entire solution
      - name: Build
        run: dotnet build ${{ env.Solution_Path }} --configuration Release

      # Execute all unit tests in the solution
      - name: Execute unit tests
        run: dotnet test ${{ env.Solution_Path }} --configuration Release --no-build

      # Run the build task
      - name: Run build task
        run: dotnet build ${{ env.Project_Path }} --no-restore --configuration Release
